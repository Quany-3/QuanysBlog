spring:
  application:
    name: QuanysBlog

  datasource:
    url: jdbc:mysql://localhost:3306/${MYSQL_DATABASE:quanysblog}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${MYSQL_USER:quanys}
    password: ${MYSQL_PASSWORD:quanys123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:quanysblog-jwt-secret-key-2024-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.learnjava.quanysblog: debug
    org.springframework.security: debug

# Admin 初始化配置
ADMIN_USERNAME: ${ADMIN_USERNAME:admin}
ADMIN_PASSWORD: ${ADMIN_PASSWORD:admin123}
ADMIN_EMAIL: ${ADMIN_EMAIL:admin@example.com}

# MinIO 对象存储配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:quanysblog}
  public-url: ${MINIO_PUBLIC_URL:http://localhost:9000/quanysblog}
  avatar-max-size: 2097152
  avatar-allowed-types: image/jpeg,image/png,image/gif,image/webp
